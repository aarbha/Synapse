<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dither Effect</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #dither-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      z-index: 10;
      min-width: 260px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      max-height: 90vh;
      overflow-y: auto;
    }

    #controls h3 {
      margin-bottom: 15px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #ccc;
      text-transform: uppercase;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
      color: #aaa;
    }

    .control-group label span.value {
      color: #fff;
      font-weight: 500;
      font-family: 'Courier New', monospace;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #888;
      cursor: pointer;
    }

    .control-group.checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-group.checkbox label {
      margin-bottom: 0;
      cursor: pointer;
    }

    input[type="checkbox"] {
      accent-color: #888;
      cursor: pointer;
      width: 16px;
      height: 16px;
    }

    .color-controls {
      display: flex;
      gap: 8px;
    }

    .color-controls .control-group {
      flex: 1;
    }

    #toggle-controls {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 11;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="dither-container"></div>

  <div id="controls">
    <h3>Dither Controls</h3>

    <div class="control-group">
      <label>Wave Speed <span class="value" id="waveSpeedVal">0.05</span></label>
      <input type="range" id="waveSpeed" min="0" max="0.3" step="0.005" value="0.05" />
    </div>

    <div class="control-group">
      <label>Wave Frequency <span class="value" id="waveFrequencyVal">3</span></label>
      <input type="range" id="waveFrequency" min="0.5" max="10" step="0.1" value="3" />
    </div>

    <div class="control-group">
      <label>Wave Amplitude <span class="value" id="waveAmplitudeVal">0.3</span></label>
      <input type="range" id="waveAmplitude" min="0.05" max="1" step="0.01" value="0.3" />
    </div>

    <h3 style="margin-top:8px;">Wave Color (RGB)</h3>
    <div class="color-controls">
      <div class="control-group">
        <label>R <span class="value" id="colorRVal">0.5</span></label>
        <input type="range" id="colorR" min="0" max="1" step="0.01" value="0.5" />
      </div>
      <div class="control-group">
        <label>G <span class="value" id="colorGVal">0.5</span></label>
        <input type="range" id="colorG" min="0" max="1" step="0.01" value="0.5" />
      </div>
      <div class="control-group">
        <label>B <span class="value" id="colorBVal">0.5</span></label>
        <input type="range" id="colorB" min="0" max="1" step="0.01" value="0.5" />
      </div>
    </div>

    <div class="control-group">
      <label>Color Levels <span class="value" id="colorNumVal">4</span></label>
      <input type="range" id="colorNum" min="2" max="16" step="1" value="4" />
    </div>

    <div class="control-group">
      <label>Pixel Size <span class="value" id="pixelSizeVal">2</span></label>
      <input type="range" id="pixelSize" min="1" max="12" step="1" value="2" />
    </div>

    <div class="control-group">
      <label>Mouse Radius <span class="value" id="mouseRadiusVal">0.3</span></label>
      <input type="range" id="mouseRadius" min="0.05" max="2" step="0.05" value="0.3" />
    </div>

    <div class="control-group checkbox">
      <input type="checkbox" id="disableAnimation" />
      <label for="disableAnimation">Disable Animation</label>
    </div>

    <div class="control-group checkbox">
      <input type="checkbox" id="enableMouse" checked />
      <label for="enableMouse">Mouse Interaction</label>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ─── CONFIG ──────────────────────────────────────────────
    const config = {
      waveSpeed: 0.05,
      waveFrequency: 3,
      waveAmplitude: 0.3,
      waveColor: [0.5, 0.5, 0.5],
      colorNum: 4,
      pixelSize: 2,
      disableAnimation: false,
      enableMouseInteraction: true,
      mouseRadius: 0.3,
    };

    // ─── SHADERS ─────────────────────────────────────────────
    const waveVertexShader = `
      precision highp float;
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const waveFragmentShader = `
      precision highp float;
      uniform vec2 resolution;
      uniform float time;
      uniform float waveSpeed;
      uniform float waveFrequency;
      uniform float waveAmplitude;
      uniform vec3 waveColor;
      uniform vec2 mousePos;
      uniform int enableMouseInteraction;
      uniform float mouseRadius;

      vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
      vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
      vec2 fade(vec2 t) { return t*t*t*(t*(t*6.0-15.0)+10.0); }

      float cnoise(vec2 P) {
        vec4 Pi = floor(P.xyxy) + vec4(0.0,0.0,1.0,1.0);
        vec4 Pf = fract(P.xyxy) - vec4(0.0,0.0,1.0,1.0);
        Pi = mod289(Pi);
        vec4 ix = Pi.xzxz, iy = Pi.yyww;
        vec4 fx = Pf.xzxz, fy = Pf.yyww;
        vec4 i = permute(permute(ix) + iy);
        vec4 gx = fract(i * (1.0/41.0)) * 2.0 - 1.0;
        vec4 gy = abs(gx) - 0.5;
        vec4 tx = floor(gx + 0.5);
        gx = gx - tx;
        vec2 g00 = vec2(gx.x, gy.x), g10 = vec2(gx.y, gy.y);
        vec2 g01 = vec2(gx.z, gy.z), g11 = vec2(gx.w, gy.w);
        vec4 norm = taylorInvSqrt(vec4(dot(g00,g00), dot(g01,g01), dot(g10,g10), dot(g11,g11)));
        g00 *= norm.x; g01 *= norm.y; g10 *= norm.z; g11 *= norm.w;
        float n00 = dot(g00, vec2(fx.x, fy.x));
        float n10 = dot(g10, vec2(fx.y, fy.y));
        float n01 = dot(g01, vec2(fx.z, fy.z));
        float n11 = dot(g11, vec2(fx.w, fy.w));
        vec2 fade_xy = fade(Pf.xy);
        vec2 n_x = mix(vec2(n00, n01), vec2(n10, n11), fade_xy.x);
        return 2.3 * mix(n_x.x, n_x.y, fade_xy.y);
      }

      const int OCTAVES = 4;
      float fbm(vec2 p) {
        float value = 0.0, amp = 1.0, freq = waveFrequency;
        for (int i = 0; i < OCTAVES; i++) {
          value += amp * abs(cnoise(p));
          p *= freq;
          amp *= waveAmplitude;
        }
        return value;
      }

      float pattern(vec2 p) {
        vec2 p2 = p - time * waveSpeed;
        return fbm(p + fbm(p2));
      }

      void main() {
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        uv -= 0.5;
        uv.x *= resolution.x / resolution.y;
        float f = pattern(uv);

        if (enableMouseInteraction == 1) {
          vec2 mouseNDC = (mousePos / resolution - 0.5) * vec2(1.0, -1.0);
          mouseNDC.x *= resolution.x / resolution.y;
          float dist = length(uv - mouseNDC);
          float effect = 1.0 - smoothstep(0.0, mouseRadius, dist);
          f -= 0.5 * effect;
        }

        vec3 col = mix(vec3(0.0), waveColor, f);
        gl_FragColor = vec4(col, 1.0);
      }
    `;

    const ditherVertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const ditherFragmentShader = `
      precision highp float;
      uniform sampler2D tDiffuse;
      uniform vec2 resolution;
      uniform float colorNum;
      uniform float pixelSize;
      varying vec2 vUv;

      const float bayerMatrix8x8[64] = float[64](
        0.0/64.0, 48.0/64.0, 12.0/64.0, 60.0/64.0,  3.0/64.0, 51.0/64.0, 15.0/64.0, 63.0/64.0,
        32.0/64.0,16.0/64.0, 44.0/64.0, 28.0/64.0, 35.0/64.0,19.0/64.0, 47.0/64.0, 31.0/64.0,
        8.0/64.0, 56.0/64.0,  4.0/64.0, 52.0/64.0, 11.0/64.0,59.0/64.0,  7.0/64.0, 55.0/64.0,
        40.0/64.0,24.0/64.0, 36.0/64.0, 20.0/64.0, 43.0/64.0,27.0/64.0, 39.0/64.0, 23.0/64.0,
        2.0/64.0, 50.0/64.0, 14.0/64.0, 62.0/64.0,  1.0/64.0,49.0/64.0, 13.0/64.0, 61.0/64.0,
        34.0/64.0,18.0/64.0, 46.0/64.0, 30.0/64.0, 33.0/64.0,17.0/64.0, 45.0/64.0, 29.0/64.0,
        10.0/64.0,58.0/64.0,  6.0/64.0, 54.0/64.0,  9.0/64.0,57.0/64.0,  5.0/64.0, 53.0/64.0,
        42.0/64.0,26.0/64.0, 38.0/64.0, 22.0/64.0, 41.0/64.0,25.0/64.0, 37.0/64.0, 21.0/64.0
      );

      vec3 dither(vec2 fragCoord, vec3 color) {
        vec2 scaledCoord = floor(fragCoord / pixelSize);
        int x = int(mod(scaledCoord.x, 8.0));
        int y = int(mod(scaledCoord.y, 8.0));
        float threshold = bayerMatrix8x8[y * 8 + x] - 0.25;
        float step = 1.0 / (colorNum - 1.0);
        color += threshold * step;
        float bias = 0.2;
        color = clamp(color - bias, 0.0, 1.0);
        return floor(color * (colorNum - 1.0) + 0.5) / (colorNum - 1.0);
      }

      void main() {
        vec2 normalizedPixelSize = pixelSize / resolution;
        vec2 uvPixel = normalizedPixelSize * floor(vUv / normalizedPixelSize);
        vec4 color = texture2D(tDiffuse, uvPixel);
        vec2 fragCoord = vUv * resolution;
        color.rgb = dither(fragCoord, color.rgb);
        gl_FragColor = color;
      }
    `;

    // ─── SETUP ───────────────────────────────────────────────
    const container = document.getElementById('dither-container');
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(1);
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // Scene 1: Wave
    const waveScene = new THREE.Scene();
    const waveCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const waveUniforms = {
      time: { value: 0 },
      resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      waveSpeed: { value: config.waveSpeed },
      waveFrequency: { value: config.waveFrequency },
      waveAmplitude: { value: config.waveAmplitude },
      waveColor: { value: new THREE.Color(...config.waveColor) },
      mousePos: { value: new THREE.Vector2(0, 0) },
      enableMouseInteraction: { value: config.enableMouseInteraction ? 1 : 0 },
      mouseRadius: { value: config.mouseRadius },
    };

    const waveMaterial = new THREE.ShaderMaterial({
      vertexShader: waveVertexShader,
      fragmentShader: waveFragmentShader,
      uniforms: waveUniforms,
    });

    const waveMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), waveMaterial);
    waveScene.add(waveMesh);

    // Render target for wave scene
    const renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
      minFilter: THREE.LinearFilter,
      magFilter: THREE.LinearFilter,
      format: THREE.RGBAFormat,
    });

    // Scene 2: Dither post-process
    const ditherScene = new THREE.Scene();
    const ditherCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const ditherUniforms = {
      tDiffuse: { value: renderTarget.texture },
      resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      colorNum: { value: config.colorNum },
      pixelSize: { value: config.pixelSize },
    };

    const ditherMaterial = new THREE.ShaderMaterial({
      vertexShader: ditherVertexShader,
      fragmentShader: ditherFragmentShader,
      uniforms: ditherUniforms,
    });

    const ditherMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), ditherMaterial);
    ditherScene.add(ditherMesh);

    // ─── MOUSE ───────────────────────────────────────────────
    const mousePos = new THREE.Vector2(0, 0);

    renderer.domElement.addEventListener('mousemove', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      const dpr = renderer.getPixelRatio();
      mousePos.set(
        (e.clientX - rect.left) * dpr,
        (e.clientY - rect.top) * dpr
      );
    });

    renderer.domElement.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const rect = renderer.domElement.getBoundingClientRect();
      const dpr = renderer.getPixelRatio();
      const touch = e.touches[0];
      mousePos.set(
        (touch.clientX - rect.left) * dpr,
        (touch.clientY - rect.top) * dpr
      );
    }, { passive: false });

    // ─── RESIZE ──────────────────────────────────────────────
    function onResize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h);
      renderTarget.setSize(w, h);
      waveUniforms.resolution.value.set(w, h);
      ditherUniforms.resolution.value.set(w, h);
    }
    window.addEventListener('resize', onResize);

    // ─── ANIMATION LOOP ─────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      if (!config.disableAnimation) {
        waveUniforms.time.value = clock.getElapsedTime();
      }

      waveUniforms.waveSpeed.value = config.waveSpeed;
      waveUniforms.waveFrequency.value = config.waveFrequency;
      waveUniforms.waveAmplitude.value = config.waveAmplitude;
      waveUniforms.waveColor.value.setRGB(...config.waveColor);
      waveUniforms.enableMouseInteraction.value = config.enableMouseInteraction ? 1 : 0;
      waveUniforms.mouseRadius.value = config.mouseRadius;
      waveUniforms.mousePos.value.copy(mousePos);

      ditherUniforms.colorNum.value = config.colorNum;
      ditherUniforms.pixelSize.value = config.pixelSize;

      // Pass 1: render waves to texture
      renderer.setRenderTarget(renderTarget);
      renderer.render(waveScene, waveCamera);

      // Pass 2: render dithered result to screen
      renderer.setRenderTarget(null);
      renderer.render(ditherScene, ditherCamera);
    }

    animate();

    // ─── CONTROLS BINDING ────────────────────────────────────
    function bindSlider(id, configKey, parser, colorIndex) {
      const input = document.getElementById(id);
      const valSpan = document.getElementById(id + 'Val');
      input.addEventListener('input', () => {
        const val = parser(input.value);
        if (colorIndex !== undefined) {
          config.waveColor[colorIndex] = val;
        } else {
          config[configKey] = val;
        }
        if (valSpan) valSpan.textContent = val;
      });
    }

    bindSlider('waveSpeed', 'waveSpeed', parseFloat);
    bindSlider('waveFrequency', 'waveFrequency', parseFloat);
    bindSlider('waveAmplitude', 'waveAmplitude', parseFloat);
    bindSlider('colorR', null, parseFloat, 0);
    bindSlider('colorG', null, parseFloat, 1);
    bindSlider('colorB', null, parseFloat, 2);
    bindSlider('colorNum', 'colorNum', parseInt);
    bindSlider('pixelSize', 'pixelSize', parseInt);
    bindSlider('mouseRadius', 'mouseRadius', parseFloat);

    document.getElementById('disableAnimation').addEventListener('change', (e) => {
      config.disableAnimation = e.target.checked;
    });

    document.getElementById('enableMouse').addEventListener('change', (e) => {
      config.enableMouseInteraction = e.target.checked;
    });
  </script>
</body>
</html>
